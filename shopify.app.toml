# Learn more about configuring your app at https://shopify.dev/docs/apps/tools/cli/configuration

client_id = "9308414a64bd97e8a6cfa1003bc6396d"
name = "PixelDock"
application_url = "https://shopify.dev/apps/pixeldock"
embedded = true

[build]
automatically_update_urls_on_dev = true
include_config_on_deploy = true

[webhooks]
api_version = "2026-04"

  [[webhooks.subscriptions]]
  topics = [ "app/uninstalled" ]
  uri = "/webhooks/app/uninstalled"

  [[webhooks.subscriptions]]
  topics = [ "app/scopes_update" ]
  uri = "/webhooks/app/scopes_update"

[access_scopes]
# Learn more at https://shopify.dev/docs/apps/tools/cli/configuration#access_scopes
scopes = "read_themes,write_themes,read_files,write_files,read_metaobjects,write_metaobjects,read_products"

[auth]
redirect_urls = [ "https://shopify.dev/apps/pixeldock/api/auth" ]

[app_proxy]
url = "https://shopify.dev/apps/pixeldock"
subpath = "pixeldock"
prefix = "apps"
